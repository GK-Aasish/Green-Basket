 <header class="bg-green-500 text-white px-4 md:px-10 py-5">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">

    <!-- Logo -->
    <div class="flex justify-between items-center w-full md:w-auto">
      <a href="{% url 'home' %}" class="text-2xl font-bold">Green Basket</a>
    </div>

    <!-- Search Bar -->
    <div class="flex w-full md:w-auto justify-center flex-1">
      <div class="flex w-full max-w-md">
        <input 
          type="text" 
          placeholder="Search for products..." 
          class="w-full px-4 py-2 rounded-l-lg text-black focus:outline-none"
        >
        <button class="bg-green-700 px-4 py-2 rounded-r-lg hover:bg-green-600 transition">
          Search
        </button>
      </div>
    </div>

    <!-- Right Section -->
    <div class="flex flex-col md:flex-row items-center justify-end gap-3 md:gap-4 w-full md:w-auto">

      <!-- Language Selector -->
      <select class="bg-green-700 px-3 py-2 rounded-lg focus:outline-none">
        <option>English</option>
        <option> Español</option>
        <option>Français</option>
      </select>

      <!-- Icons -->
      <div class="flex items-center gap-4 text-sm md:text-base">

        <div href="#" class="flex items-center gap-1 group-hover:text-red-500">
          <i class="fas fa-heart text-lg hover:text-red-500"></i>
          <span class="hidden sm:inline">Wishlist</span>
        </div>

        <div>
          <i class="fas fa-shopping-cart text-lg"></i>
          <span class="hidden sm:inline">Cart</span>
        </div>

        <div href="#" class="flex items-center gap-1">
          <i class="fas fa-user text-lg"></i>
          <!--If user is authenticated, show username; else redirect to login-->
          {% if user.is_authenticated %}
            <a href="{% url 'profile' %}">{{ user.username }}</a>
          {% else %}
            <a href="{% url 'login' %}">Login</a>
          {% endif %}
        </div>

      </div>
    </div>

  </div>
</header>
