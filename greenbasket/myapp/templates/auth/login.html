<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/output.css' %}">
</head>

<body class="min-h-screen bg-gradient-to-br from-green-100 via-white to-blue-100 flex items-center justify-center">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl p-8">

        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Welcome Back 👋</h1>
            <p class="text-gray-500 text-sm mt-2">Login to your account</p>
        </div>

        <!-- Form -->
        <form method="post" action="{% url 'login' %}" class="space-y-5">
            {% csrf_token %}

            <!-- Username -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input 
                    type="text" 
                    name="username"
                    placeholder="Enter your username"
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none"
                    required
                >
            </div>

            <!-- Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input 
                    type="password" 
                    name="password"
                    placeholder="Enter your password"
                    class="w-full px-4 py-3 border rounded-lg focus:ring-2 focus:ring-green-400 focus:outline-none"
                    required
                >
            </div>

            <!-- Remember + Forgot -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center space-x-2">
                    <input type="checkbox" class="accent-green-600">
                    <span class="text-gray-600">Remember me</span>
                </label>

                <a href="#" class="text-green-600 hover:underline">Forgot password?</a>
            </div>

            <!-- Button -->
            <button 
                type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md"
            >
                Login
            </button>
        </form>

        <!-- Footer -->
        <p class="text-center text-sm text-gray-500 mt-6">
            Don’t have an account?
            <a href="{% url 'signup' %}" class="text-green-600 font-semibold hover:underline">
                Sign up
            </a>
        </p>

    </div>

</body>
</html>
